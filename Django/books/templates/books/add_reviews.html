{% extends 'base.html' %}

{% block title %}Add Review - {{ book.title }}{% endblock %}

{% block content %}
	<h1>Add Review for "{{ book.title }}"</h1>

	<form method="post">
		{% csrf_token %}
        {{form.as_p}}
		<button type="submit" class="btn">Submit Review</button>
        <a href="{%url 'book_list' % }" class="btn">Cancel</a>
	</form>
    {% endblock %}
